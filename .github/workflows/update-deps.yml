name: Update Dependencies

# ─────────────────────────────────────────────────────────────────────────────
# Runs a full `go get -u ./...` sweep on the first Monday of every month.
#
# This complements Dependabot (which handles individual packages weekly) by
# doing a holistic "upgrade everything at once" pass and verifying the entire
# test suite still passes before opening a single consolidated PR.
#
# You can also trigger it manually from the GitHub Actions tab.
# ─────────────────────────────────────────────────────────────────────────────
on:
  # First Monday of each month at 08:00 UTC
  # (cron has no "first weekday" primitive — the if-day guard below handles it)
  schedule:
    - cron: '0 8 1-7 * 1'

  # Manual trigger (useful for ad-hoc runs or testing)
  workflow_dispatch:
    inputs:
      go_version:
        description: 'Go version to use (leave blank to use repo default)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — update deps but do not open a PR'
        type: boolean
        required: false
        default: false

env:
  GO_VERSION: '1.24.6'

jobs:
  update:
    name: Bump all Go modules
    runs-on: ubuntu-latest

    # Write permission needed to push the update branch
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the pushed branch can trigger CI workflows.
          # Falls back to GITHUB_TOKEN (PRs will still open but won't trigger CI).
          token: ${{ secrets.DEPS_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Go toolchain ──────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version || env.GO_VERSION }}
          cache: true

      # ── 3. Upgrade all direct + indirect dependencies ────────────────────
      - name: Upgrade all modules
        id: upgrade
        run: |
          echo "### Before upgrade" >> $GITHUB_STEP_SUMMARY
          go list -m -u all 2>/dev/null | grep '\[' | head -40 >> $GITHUB_STEP_SUMMARY || true

          # Upgrade direct deps (those in the first `require` block of go.mod)
          go get -u ./...

          # Tidy — removes unused, prunes go.sum
          go mod tidy

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### After upgrade" >> $GITHUB_STEP_SUMMARY
          go list -m all 2>/dev/null | head -60 >> $GITHUB_STEP_SUMMARY || true

      # ── 4. Update vendor directory ───────────────────────────────────────
      - name: Sync vendor directory
        run: |
          if [ -d vendor ]; then
            go mod vendor
            echo "vendor/ updated"
          else
            echo "No vendor/ directory — skipping vendor sync"
          fi

      # ── 5. Run the full test suite ───────────────────────────────────────
      # If tests fail after the upgrade, the workflow fails and no PR is opened.
      # The summary will show which packages broke so it's easy to diagnose.
      - name: Run tests
        run: |
          go test -short -race ./internal/... 2>&1 | tee test-output.txt
          EXIT=${PIPESTATUS[0]}
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test results" >> $GITHUB_STEP_SUMMARY
          if [ $EXIT -eq 0 ]; then
            echo "✅ All tests passed after upgrade" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed after upgrade — PR not opened" >> $GITHUB_STEP_SUMMARY
            cat test-output.txt >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      # ── 6. Check whether anything actually changed ───────────────────────
      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet go.mod go.sum $([ -d vendor ] && echo vendor/ || true); then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No dependency changes — nothing to commit." >> $GITHUB_STEP_SUMMARY
          else
            echo "changed=true" >> $GITHUB_OUTPUT

            # Collect a human-readable diff of go.mod for the PR body
            DIFF=$(git diff go.mod | head -120)
            echo "go_mod_diff<<EOF" >> $GITHUB_OUTPUT
            echo "$DIFF" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      # ── 7. Commit changes onto a dedicated branch ────────────────────────
      - name: Commit updated go.mod / go.sum / vendor
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="deps/auto-update-$(date -u +%Y-%m)"
          git checkout -b "$BRANCH"
          git add go.mod go.sum
          [ -d vendor ] && git add vendor/ || true

          git commit -m "chore(deps): monthly dependency upgrade $(date -u +%Y-%m-%d)

          Automated upgrade via \`go get -u ./...\` + \`go mod tidy\`.
          All tests passed after this upgrade.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        id: commit

      # ── 8. Open a Pull Request ───────────────────────────────────────────
      - name: Open Pull Request
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.DEPS_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          branch: deps/auto-update-${{ github.run_id }}
          base: main
          title: "chore(deps): monthly dependency upgrade \U0001F4E6"
          labels: |
            dependencies
            go
            automated
          body: |
            ## Monthly dependency upgrade

            This PR was opened automatically by the [Update Dependencies](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.

            ### What changed
            All direct and transitive Go modules were upgraded with:
            ```
            go get -u ./...
            go mod tidy
            go mod vendor   # (if vendor/ exists)
            ```

            ### Test status
            ✅ Full test suite (`go test -short -race ./internal/...`) passed after upgrade.

            ### go.mod diff (first 120 lines)
            <details>
            <summary>Click to expand</summary>

            ```diff
            ${{ steps.changes.outputs.go_mod_diff }}
            ```
            </details>

            ### Review checklist
            - [ ] Scan the diff for any major version bumps (these may have breaking API changes)
            - [ ] Check CHANGELOG / release notes for packages with significant version jumps
            - [ ] Run `make test` locally if you want to verify on your machine
            - [ ] Merge when CI is green ✅

            ---
            _To skip future runs: close this PR and disable the [Update Dependencies](${{ github.server_url }}/${{ github.repository }}/actions/workflows/update-deps.yml) workflow._

      # ── 9. Dry-run summary ───────────────────────────────────────────────
      - name: Dry-run notice
        if: inputs.dry_run == 'true' && steps.changes.outputs.changed == 'true'
        run: |
          echo "### Dry run — no PR opened" >> $GITHUB_STEP_SUMMARY
          echo "Re-run without \`dry_run\` to open a PR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "go.mod diff:" >> $GITHUB_STEP_SUMMARY
          git diff go.mod | head -80 >> $GITHUB_STEP_SUMMARY

      # ── 10. No-op summary ────────────────────────────────────────────────
      - name: No-changes notice
        if: steps.changes.outputs.changed == 'false'
        run: |
          echo "✅ All dependencies are already up to date." >> $GITHUB_STEP_SUMMARY
