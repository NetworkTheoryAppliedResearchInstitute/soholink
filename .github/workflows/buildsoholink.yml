name: Build and Release SoHoLINK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

env:
  GO_VERSION: '1.22'
  APP_NAME: 'SoHoLINK'

jobs:
  build:
    name: Build ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    
    strategy:
      matrix:
        config:
          # Windows builds
          - name: Windows AMD64
            os: windows-latest
            goos: windows
            goarch: amd64
            output: fedaaa.exe
            artifact: windows-amd64
          
          # Linux builds
          - name: Linux AMD64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: fedaaa
            artifact: linux-amd64
          
          # Raspberry Pi
          - name: Linux ARM64 (Raspberry Pi)
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: fedaaa
            artifact: linux-arm64
          
          # macOS builds
          - name: macOS AMD64
            os: macos-latest
            goos: darwin
            goarch: amd64
            output: fedaaa
            artifact: darwin-amd64
          
          - name: macOS ARM64 (Apple Silicon)
            os: macos-latest
            goos: darwin
            goarch: arm64
            output: fedaaa
            artifact: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies (for GUI builds)
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Get version info
        id: version
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="0.1.0-dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build CLI binary
        env:
          GOOS: ${{ matrix.config.goos }}
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -v \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/${{ matrix.config.output }} \
            ./cmd/fedaaa

      - name: Build GUI binary (if supported)
        if: matrix.config.os != 'ubuntu-latest' || matrix.config.goarch == 'amd64'
        env:
          GOOS: ${{ matrix.config.goos }}
          GOARCH: ${{ matrix.config.goarch }}
          CGO_ENABLED: 1
        continue-on-error: true
        run: |
          OUTPUT_NAME="fedaaa-gui"
          if [ "${{ matrix.config.goos }}" = "windows" ]; then
            OUTPUT_NAME="fedaaa-gui.exe"
          fi
          go build -v -tags gui \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }} -X main.commit=${{ github.sha }}" \
            -o bin/$OUTPUT_NAME \
            ./cmd/fedaaa-gui || echo "GUI build skipped or failed"

      - name: Create README for release
        shell: bash
        run: |
          cat > bin/README.txt << 'EOF'
          SoHoLINK - Federated Edge AAA Platform
          Version: ${{ steps.version.outputs.version }}
          
          QUICK START:
          
          1. Extract this archive
          2. Run the installer:
             Windows: Right-click install.bat -> "Run as administrator"
             Linux: sudo ./fedaaa install
             macOS: sudo ./fedaaa install
          
          3. Start the service:
             ./fedaaa start
          
          DOCUMENTATION:
          - README.md - Full documentation
          - QUICKSTART.md - Quick start guide
          - LICENSE.txt - License information
          
          SUPPORT:
          - GitHub: https://github.com/NetworkTheoryAppliedResearchInstitute/soholink
          - Email: info@ntari.org
          - Website: https://ntari.org
          
          This software is licensed under AGPL-3.0
          Built by Network Theory Applied Research Institute (NTARI)
          EOF

      - name: Create Windows installer script
        if: matrix.config.goos == 'windows'
        shell: bash
        run: |
          cat > bin/install.bat << 'EOF'
          @echo off
          echo ================================
          echo SoHoLINK Installation
          echo ================================
          echo.
          
          REM Check for admin privileges
          net session >nul 2>&1
          if %errorLevel% neq 0 (
              echo ERROR: This script requires administrator privileges.
              echo Please right-click install.bat and select "Run as administrator"
              pause
              exit /b 1
          )
          
          echo Installing SoHoLINK...
          echo.
          
          REM Create installation directory
          set INSTALL_DIR=C:\Program Files\SoHoLINK
          if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"
          
          REM Copy files
          echo Copying files to %INSTALL_DIR%...
          xcopy /Y /Q fedaaa.exe "%INSTALL_DIR%\"
          if exist fedaaa-gui.exe xcopy /Y /Q fedaaa-gui.exe "%INSTALL_DIR%\"
          if exist README.txt xcopy /Y /Q README.txt "%INSTALL_DIR%\"
          
          REM Add to PATH
          echo Adding to system PATH...
          setx PATH "%PATH%;%INSTALL_DIR%" /M >nul 2>&1
          
          REM Create data directory
          set DATA_DIR=%PROGRAMDATA%\SoHoLINK
          if not exist "%DATA_DIR%" mkdir "%DATA_DIR%"
          if not exist "%DATA_DIR%\data" mkdir "%DATA_DIR%\data"
          if not exist "%DATA_DIR%\logs" mkdir "%DATA_DIR%\logs"
          
          REM Create desktop shortcut (if GUI exists)
          if exist "%INSTALL_DIR%\fedaaa-gui.exe" (
              echo Creating desktop shortcut...
              powershell -Command "$WshShell = New-Object -ComObject WScript.Shell; $Shortcut = $WshShell.CreateShortcut('%USERPROFILE%\Desktop\SoHoLINK.lnk'); $Shortcut.TargetPath = '%INSTALL_DIR%\fedaaa-gui.exe'; $Shortcut.Save()"
          )
          
          echo.
          echo ================================
          echo Installation Complete!
          echo ================================
          echo.
          echo Next steps:
          echo 1. Close this window and open a new Command Prompt
          echo 2. Run: fedaaa install
          echo 3. Run: fedaaa start
          echo.
          echo Or double-click the SoHoLINK desktop shortcut (if available)
          echo.
          pause
          EOF

      - name: Create Linux/macOS installer script
        if: matrix.config.goos != 'windows'
        shell: bash
        run: |
          cat > bin/install.sh << 'EOF'
          #!/bin/bash
          
          echo "================================"
          echo "SoHoLINK Installation"
          echo "================================"
          echo
          
          # Check for root privileges
          if [ "$EUID" -ne 0 ]; then
              echo "ERROR: This script requires root privileges."
              echo "Please run: sudo ./install.sh"
              exit 1
          fi
          
          echo "Installing SoHoLINK..."
          echo
          
          # Determine installation directory
          INSTALL_DIR="/usr/local/bin"
          
          # Copy executable
          echo "Installing to $INSTALL_DIR..."
          cp -v fedaaa "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/fedaaa"
          
          if [ -f "fedaaa-gui" ]; then
              cp -v fedaaa-gui "$INSTALL_DIR/"
              chmod +x "$INSTALL_DIR/fedaaa-gui"
          fi
          
          # Create data directories
          mkdir -p /etc/soholink
          mkdir -p /var/lib/soholink/data
          mkdir -p /var/log/soholink
          
          # Set permissions
          chown -R root:root /etc/soholink
          chown -R root:root /var/lib/soholink
          chown -R root:root /var/log/soholink
          chmod 755 /etc/soholink
          chmod 755 /var/lib/soholink
          chmod 755 /var/log/soholink
          
          echo
          echo "================================"
          echo "Installation Complete!"
          echo "================================"
          echo
          echo "Next steps:"
          echo "1. Run: fedaaa install"
          echo "2. Run: fedaaa start"
          echo
          EOF
          chmod +x bin/install.sh

      - name: Package additional files
        shell: bash
        run: |
          cp README.md bin/ || true
          cp QUICKSTART.md bin/ || true
          cp LICENSE.txt bin/ || true

      - name: Create archive
        shell: bash
        run: |
          cd bin
          if [ "${{ matrix.config.goos }}" = "windows" ]; then
            7z a ../SoHoLINK-${{ steps.version.outputs.version }}-${{ matrix.config.artifact }}.zip *
          else
            tar -czf ../SoHoLINK-${{ steps.version.outputs.version }}-${{ matrix.config.artifact }}.tar.gz *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoHoLINK-${{ matrix.config.artifact }}
          path: |
            SoHoLINK-${{ steps.version.outputs.version }}-${{ matrix.config.artifact }}.*
          retention-days: 30

  # Create GitHub Release when a tag is pushed
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Build and test without creating artifacts (for PRs)
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.txt
          fail_ci_if_error: false
