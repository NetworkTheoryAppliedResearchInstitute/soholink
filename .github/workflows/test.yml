name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25.7'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Unit + race tests across all three OS families
  # GUI packages are excluded here (require CGO + display server).
  # Full GUI builds are handled by build.yml via GoReleaser.
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        # Exclude internal/gui — it requires CGO + OpenGL on all platforms
        run: go test -v -race ./internal/...

      - name: Run integration tests (best-effort)
        run: go test -v -tags=integration ./internal/...
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # Static analysis
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ─────────────────────────────────────────────────────────────────────────
  # OPA policy tests
  # ─────────────────────────────────────────────────────────────────────────
  opa-test:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA policy tests
        # --v1-compatible: policies use OPA v1 syntax (if/contains keywords)
        run: opa test --v1-compatible configs/policies/ -v

  # ─────────────────────────────────────────────────────────────────────────
  # Security scanning (Gosec → SARIF → GitHub Security tab)
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
