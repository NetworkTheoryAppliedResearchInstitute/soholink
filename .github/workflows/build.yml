name: Build and Release

# ─────────────────────────────────────────────────────────────────────────────
# Trigger policy
#   • Every push to main/develop → snapshot build (no git tag needed)
#   • Every PR against main      → snapshot build (no upload)
#   • Push of a v* tag           → real release, published to GitHub Releases
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24.6'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1 — Tests (headless CLI only; GUI requires CGO + display server)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./internal/...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 — GoReleaser (snapshot on branch push; real release on tag push)
  #
  # What GoReleaser produces in one job (from .goreleaser.yml):
  #   Windows   → soholink-gui_*_windows_amd64.zip  (statically linked .exe)
  #               SoHoLINK-Setup.exe                (NSIS installer, if makensis present)
  #   macOS     → soholink-gui_*_macOS_universal.tar.gz  (Intel + Apple Silicon)
  #               SoHoLINK-*.pkg                    (if build-pkg.sh present)
  #   Linux     → soholink-gui_*_linux_amd64.tar.gz
  #               FedAAA-*-x86_64.AppImage          (if appimagetool present)
  #               soholink_*.deb  soholink-*.rpm     (nFPM)
  #   CLI       → soholink_*_{linux,macOS,windows}_*.tar.gz / .zip
  #   Checksums → soholink_*_checksums.txt
  # ─────────────────────────────────────────────────────────────────────────
  goreleaser:
    name: GoReleaser (${{ startsWith(github.ref, 'refs/tags/') && 'release' || 'snapshot' }})
    runs-on: ubuntu-latest
    needs: test

    # Give the job permission to create GitHub Releases
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # GoReleaser needs full history for changelog

      # ── Go toolchain ────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # ── MinGW cross-compiler for Windows GUI (static linking) ──────────
      # CGO_ENABLED=1 + x86_64-w64-mingw32-gcc → produces zero-DLL Windows .exe
      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      # ── NSIS (optional — builds SoHoLINK-Setup.exe installer) ──────────
      - name: Install NSIS
        run: sudo apt-get install -y --no-install-recommends nsis

      # ── AppImage tool (optional — builds Linux AppImage) ───────────────
      - name: Install appimagetool
        run: |
          curl -sSfL \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool
          # AppImage binaries require FUSE; use the extract-and-run workaround in CI
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      # ── Download Go module dependencies ────────────────────────────────
      - name: Download dependencies
        run: go mod download

      # ── GoReleaser — snapshot (branches / PRs) ──────────────────────────
      - name: Run GoReleaser (snapshot)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version:      '~> v2'
          args:         release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH:       ${{ github.workspace }}/go

      # ── GoReleaser — real release (tags only) ───────────────────────────
      - name: Run GoReleaser (release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version:      '~> v2'
          args:         release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH:       ${{ github.workspace }}/go

      # ── Upload snapshot artifacts for inspection ─────────────────────────
      - name: Upload snapshot artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-packages-${{ github.sha }}
          retention-days: 7
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*checksums*
