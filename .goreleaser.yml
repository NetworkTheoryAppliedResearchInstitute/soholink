# .goreleaser.yml — SoHoLINK cross-platform release automation
# Docs: https://goreleaser.com
#
# Usage:
#   goreleaser release --snapshot --clean   ← local test build (no git tag needed)
#   goreleaser release --clean              ← real release (requires git tag v*)
#
# Install goreleaser:
#   go install github.com/goreleaser/goreleaser/v2@latest

version: 2

project_name: soholink

# ─────────────────────────────────────────────────────────────
# Version metadata injected at compile time
# ─────────────────────────────────────────────────────────────
builds:
  # ── 1. Headless CLI (pure-Go, no CGO, runs anywhere) ───────
  - id: soholink-cli
    main: ./cmd/soholink
    binary: soholink
    no_unique_dist_dir: false
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64   # Windows/arm64 CGO cross-compile is non-trivial
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    tags:
      - []   # no 'gui' tag → headless binary

  # ── 2. GUI binary — Windows (statically links MinGW runtime) ─
  #    Requires: CGO_ENABLED=1 + MinGW-w64 GCC in PATH
  #    The -static-libgcc/-static-libstdc++ flags embed the C++
  #    runtime into the .exe so end-users need ZERO extra DLLs.
  - id: soholink-gui-windows
    main: ./cmd/soholink
    binary: soholink
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -H=windowsgui
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
      # Statically embed the MinGW C/C++ runtime — no DLL needed on user machine
      - -extldflags "-static-libgcc -static-libstdc++ -static-libpthread"
    tags:
      - gui

  # ── 3. GUI binary — macOS (universal binary via lipo post-hook) ─
  - id: soholink-gui-macos-amd64
    main: ./cmd/soholink
    binary: soholink
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    tags:
      - gui

  - id: soholink-gui-macos-arm64
    main: ./cmd/soholink
    binary: soholink
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    tags:
      - gui

  # ── 4. GUI binary — Linux amd64 ──────────────────────────────
  #    Packaged as AppImage which bundles its own libs (see below)
  - id: soholink-gui-linux
    main: ./cmd/soholink
    binary: soholink
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    tags:
      - gui

# ─────────────────────────────────────────────────────────────
# Universal macOS binary (Intel + Apple Silicon merged)
# ─────────────────────────────────────────────────────────────
universal_binaries:
  - id: soholink-gui-macos-universal
    ids:
      - soholink-gui-macos-amd64
      - soholink-gui-macos-arm64
    replace: true
    name_template: soholink

# ─────────────────────────────────────────────────────────────
# Archive layout — what goes inside each zip/tar.gz
# ─────────────────────────────────────────────────────────────
archives:
  # CLI archives (all platforms — plain binary, no CGO)
  - id: cli-archive
    ids:
      - soholink-cli
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
      - configs/

  # Windows GUI — single .exe in a zip; NSIS installer is separate
  - id: windows-gui-archive
    ids:
      - soholink-gui-windows
    name_template: "{{ .ProjectName }}-gui_{{ .Version }}_windows_amd64"
    format: zip
    files:
      - README.md
      - configs/

  # macOS — universal binary in tar.gz (installer wraps into .pkg)
  - id: macos-gui-archive
    ids:
      - soholink-gui-macos-universal
    name_template: "{{ .ProjectName }}-gui_{{ .Version }}_macOS_universal"
    format: tar.gz
    files:
      - README.md
      - configs/

  # Linux GUI — raw binary (AppImage is built separately below)
  - id: linux-gui-archive
    ids:
      - soholink-gui-linux
    name_template: "{{ .ProjectName }}-gui_{{ .Version }}_linux_amd64"
    format: tar.gz
    files:
      - README.md
      - configs/

# ─────────────────────────────────────────────────────────────
# Linux packages via nFPM  (.deb + .rpm)
# ─────────────────────────────────────────────────────────────
nfpms:
  - id: linux-packages
    package_name: soholink
    builds:
      - soholink-cli       # headless service binary
    vendor: Network Theory Applied Research Institute
    homepage: https://soholink.io
    maintainer: NTARI <support@soholink.io>
    description: |-
      SoHoLINK — Federated SOHO Compute Marketplace.
      Monetise idle CPU/GPU/storage and rent compute from the
      global SOHO federation. Includes auto-wizard, dashboard,
      and payment processing.
    license: TBD
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: net
    contents:
      - src: packaging/linux/fedaaa.service
        dst: /usr/lib/systemd/system/soholink.service
      - src: configs/
        dst: /etc/soholink/
        type: config|noreplace
      - dst: /var/lib/soholink
        type: dir
        file_info:
          mode: 0750
      - dst: /var/log/soholink
        type: dir
        file_info:
          mode: 0750
    scripts:
      preinstall:  packaging/linux/preinstall.sh
      postinstall: packaging/linux/postinstall.sh
      preremove:   packaging/linux/preremove.sh
      postremove:  packaging/linux/postremove.sh
    overrides:
      deb:
        dependencies:
          - systemd
        recommends:
          - firecracker
        suggests:
          - redis
          - postgresql
      rpm:
        dependencies:
          - systemd

# ─────────────────────────────────────────────────────────────
# Windows NSIS installer (.exe setup wizard)
# goreleaser calls the NSIS makensis binary post-build
# ─────────────────────────────────────────────────────────────
# (Handled via the after hook below — goreleaser v2 uses hooks
#  for NSIS/WiX because they are not natively supported)

# ─────────────────────────────────────────────────────────────
# Hooks — run after binaries are built
# ─────────────────────────────────────────────────────────────
after:
  hooks:
    # ── Windows: copy GUI .exe into installer staging dir, run NSIS ──
    - cmd: bash
      args:
        - -c
        - |
          set -e
          EXE=$(ls dist/soholink-gui_*/soholink.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then exit 0; fi
          cp "$EXE" installer/windows/soholink.exe
          # Also copy CLI wizard if built
          WIZARD=$(ls dist/soholink_*/soholink.exe 2>/dev/null | head -1)
          [ -n "$WIZARD" ] && cp "$WIZARD" installer/windows/soholink-wizard.exe || true
          mkdir -p dist
          if command -v makensis >/dev/null 2>&1; then
            makensis /DVERSION={{.Version}} installer/windows/installer.nsi
            echo "NSIS installer built: dist/SoHoLINK-Setup.exe"
          else
            echo "NSIS not found — skipping Windows installer (zip archive still available)"
          fi
      env:
        - GOPATH={{ .Env.GOPATH }}

    # ── Linux: build AppImage from the GUI binary ─────────────────
    - cmd: bash
      args:
        - -c
        - |
          set -e
          BIN=$(ls dist/soholink-gui_*linux*/soholink 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then exit 0; fi
          export VERSION={{.Version}}
          export BINARY="$BIN"
          bash packaging/linux/build-appimage.sh || echo "AppImage build skipped (appimagetool unavailable)"
      env:
        - GOPATH={{ .Env.GOPATH }}

    # ── macOS: wrap universal binary into a .app bundle ───────────
    - cmd: bash
      args:
        - -c
        - |
          set -e
          BIN=$(ls dist/soholink-gui_*macOS*/soholink 2>/dev/null | head -1)
          if [ -z "$BIN" ] || [ "$(uname)" != "Darwin" ]; then exit 0; fi
          export VERSION={{.Version}}
          export BINARY="$BIN"
          bash packaging/macos/build-pkg.sh || echo "macOS PKG build skipped"

# ─────────────────────────────────────────────────────────────
# GitHub Release configuration
# ─────────────────────────────────────────────────────────────
release:
  github:
    owner: NetworkTheoryAppliedResearchInstitute
    name: soholink
  name_template: "SoHoLINK v{{ .Version }}"
  draft: false
  prerelease: auto   # tags like v0.1.0-beta are marked as pre-release
  header: |
    ## SoHoLINK {{ .Version }}

    Federated SOHO compute marketplace — monetise your idle hardware.

    ### Downloads
    | Platform | File | Notes |
    |----------|------|-------|
    | **Windows** | `SoHoLINK-Setup.exe` | Recommended — one-click installer |
    | **Windows** | `soholink-gui_*_windows_amd64.zip` | Portable, no install needed |
    | **macOS** | `soholink-gui_*_macOS_universal.pkg` | Universal (Intel + Apple Silicon) |
    | **Linux** | `FedAAA-*-x86_64.AppImage` | Single-file, no install needed |
    | **Linux** | `soholink_*_linux_amd64.deb` | Debian/Ubuntu |
    | **Linux** | `soholink-*.amd64.rpm` | Fedora/RHEL |
    | **Any** | `soholink_*_linux/macOS/windows_*.tar.gz/.zip` | Headless CLI |
  footer: |
    **Full changelog**: https://github.com/NetworkTheoryAppliedResearchInstitute/soholink/compare/{{ .PreviousTag }}...{{ .Tag }}

# ─────────────────────────────────────────────────────────────
# SHA256 checksums file (published alongside artifacts)
# ─────────────────────────────────────────────────────────────
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# ─────────────────────────────────────────────────────────────
# Snapshot builds (local testing without a git tag)
# ─────────────────────────────────────────────────────────────
snapshot:
  version_template: "{{ .Tag }}-dev-{{ .ShortCommit }}"

# ─────────────────────────────────────────────────────────────
# Changelog generation from conventional commits
# ─────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - typo
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: "Other"
      order: 999
