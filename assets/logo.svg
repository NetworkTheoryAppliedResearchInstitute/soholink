<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0D1B2A"/>

  <!-- Globe wireframe ring (horizontal) -->
  <ellipse cx="128" cy="128" rx="90" ry="28" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.6"/>
  <!-- Globe wireframe ring (tilted) -->
  <ellipse cx="128" cy="128" rx="90" ry="28" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.6"
           transform="rotate(60 128 128)"/>
  <ellipse cx="128" cy="128" rx="90" ry="28" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.6"
           transform="rotate(120 128 128)"/>

  <!-- Outer globe circle -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="#00E5FF" stroke-width="3"/>

  <!-- Node dots — simulating federated SOHO devices on the globe -->
  <circle cx="128" cy="38"  r="7" fill="#00E5FF"/>
  <circle cx="198" cy="78"  r="6" fill="#4FC3F7"/>
  <circle cx="210" cy="158" r="6" fill="#4FC3F7"/>
  <circle cx="148" cy="210" r="7" fill="#00E5FF"/>
  <circle cx="58"  cy="178" r="6" fill="#4FC3F7"/>
  <circle cx="48"  cy="95"  r="6" fill="#4FC3F7"/>
  <circle cx="128" cy="128" r="9" fill="#FFFFFF"/>

  <!-- Connection lines from centre node to outer nodes -->
  <line x1="128" y1="128" x2="128" y2="45"  stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="128" x2="193" y2="83"  stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="128" x2="205" y2="155" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="128" x2="148" y2="204" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="128" x2="63"  y2="173" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>
  <line x1="128" y1="128" x2="53"  y2="100" stroke="#00E5FF" stroke-width="1.5" opacity="0.7"/>

  <!-- "SOHO" label at bottom -->
  <text x="128" y="232" font-family="monospace" font-size="18" font-weight="bold"
        text-anchor="middle" fill="#00E5FF" letter-spacing="6">SOHO</text>
</svg>
